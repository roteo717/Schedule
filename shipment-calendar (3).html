<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>月間出荷予定表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN: Industrial precision calendar
   Tone: Clean utilitarian factory dashboard
   White bg, strong typographic hierarchy
═══════════════════════════════════════════ */
:root {
  --ok:        #15803d;
  --ok-light:  #dcfce7;
  --ok-mid:    #86efac;
  --warn:      #b45309;
  --warn-light:#fef9c3;
  --warn-mid:  #fde047;
  --ng:        #b91c1c;
  --ng-light:  #fee2e2;
  --ng-mid:    #fca5a5;

  --ink:       #0f172a;
  --ink2:      #334155;
  --ink3:      #64748b;
  --ink4:      #94a3b8;
  --border:    #e2e8f0;
  --surface:   #f8fafc;
  --white:     #ffffff;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.06);
  --shadow-modal: 0 8px 40px rgba(0,0,0,.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.app-header {
  background: var(--white);
  border-bottom: 2px solid var(--ink);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-brand .brand-mark {
  width: 28px; height: 28px;
  background: var(--ink);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.header-brand h1 {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: .04em;
}
.header-actions { display: flex; gap: 6px; align-items: center; }

.btn-add {
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 7px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s, transform .1s;
}
.btn-add:hover { background: #1e293b; }
.btn-add:active { transform: scale(.97); }

/* ── STATUS LEGEND ── */
.legend-strip {
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  gap: 14px;
  align-items: center;
  background: var(--surface);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-dot.ok   { background: var(--ok); }
.legend-dot.warn { background: var(--warn); }
.legend-dot.ng   { background: var(--ng); }

/* ── CALENDAR CONTAINER ── */
.cal-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 0 100px;
}

/* ── MONTH NAV ── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
}
.month-label {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: .03em;
}
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink2);
  transition: border-color .15s, background .15s;
}
.nav-btn:hover { border-color: var(--ink); background: var(--surface); }
.nav-btn:active { background: var(--border); }

/* ── DOW HEADER ── */
.dow-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
  margin-bottom: 4px;
}
.dow-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--ink4);
  padding: 4px 0;
}
.dow-cell:first-child { color: #ef4444; }
.dow-cell:last-child  { color: #3b82f6; }

/* ── CALENDAR GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  padding: 0 12px;
}

.cal-day {
  aspect-ratio: 1 / 1.15;
  border-radius: var(--r-sm);
  border: 1.5px solid transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 5px 2px 3px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
  position: relative;
  min-width: 0;
  background: var(--white);
  user-select: none;
}
.cal-day:not(.empty):hover {
  border-color: var(--ink);
  background: var(--surface);
}
.cal-day:not(.empty):active { transform: scale(.95); }
.cal-day.empty { cursor: default; opacity: 0; pointer-events: none; }
.cal-day.other-month .day-num { color: var(--ink4); }
.cal-day.today .day-num {
  background: var(--ink);
  color: var(--white);
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.sunday  .day-num { color: #ef4444; }
.cal-day.saturday .day-num { color: #3b82f6; }
.cal-day.today .day-num { color: var(--white) !important; }

.day-num {
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 3px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}

/* (dots replaced by count badge) */

/* Day with shipments gets subtle tint based on worst status */
.cal-day.has-ng   { background: #ffe4e6; border: 2px solid #b91c1c !important; }
.cal-day.has-warn { background: #fffdf0; }
.cal-day.has-ok   { background: #f0faf4; }

/* ── SHIP COUNT BADGE ON CALENDAR ── */
.day-count {
  font-size: 11px;
  font-weight: 900;
  line-height: 1;
  padding: 2px 5px;
  border-radius: 4px;
  margin-top: 1px;
}
.day-count.ng   { background: #b91c1c; color: #fff; }
.day-count.warn { background: var(--warn); color: #fff; }
.day-count.ok   { background: var(--ok); color: #fff; }

/* ── DETAIL PANEL (slide up) ── */
.detail-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
}
.detail-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.detail-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,.45);
  backdrop-filter: blur(2px);
}
.detail-sheet {
  position: relative;
  background: var(--white);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  max-height: 80vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform .25s cubic-bezier(.32,1.2,.6,1);
  box-shadow: var(--shadow-modal);
}
.detail-overlay.open .detail-sheet { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}
.sheet-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sheet-date {
  font-size: 17px;
  font-weight: 900;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sheet-close {
  width: 30px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--ink3);
  transition: border-color .15s;
}
.sheet-close:hover { border-color: var(--ink); color: var(--ink); }

.sheet-filter {
  padding: 8px 16px;
  display: flex;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.chip-filter {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white);
  cursor: pointer;
  transition: all .15s;
}
.chip-filter.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.chip-filter:not(.active):hover { border-color: var(--ink3); }

.sheet-cards {
  padding: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ══════════════════════════════════════
   ITEM CARD  ― priority-based layout
   視線の流れ：品名 → 不足数 → 補足
══════════════════════════════════════ */
.item-card {
  border-radius: var(--r-md);
  border: 1.5px solid var(--border);
  background: var(--white);
  box-shadow: var(--shadow-card);
  animation: slideIn .2s ease both;
  overflow: hidden;
}
.item-card.ng   { border: 2px solid #b91c1c; }
.item-card.warn { border: 2px solid #d97706; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ① 品名バー ─ 最重要テキスト */
.c-name-row {
  padding: 14px 16px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.c-name {
  font-size: 20px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.2;
  flex: 1;
  min-width: 0;
  word-break: break-all;
}
.c-actions {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  padding-top: 2px;
}

/* ② 品番 ─ 品名の直下に小さく */
.c-code-row {
  padding: 2px 16px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.c-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink4);
  letter-spacing: .06em;
}
/* ③ 出荷日バッジ */
.c-date-badge {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 7px;
  white-space: nowrap;
}
.c-date-badge.today-date  { background: #fef9c3; color: #92400e; border-color: #fde047; }
.c-date-badge.past-date   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

/* ④ 不足数ブロック ─ カード内で最も目立つ */
.c-diff-block {
  margin: 10px 16px 0;
  border-radius: var(--r-sm);
  padding: 10px 14px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.item-card.ng   .c-diff-block { background: #fee2e2; }
.item-card.warn .c-diff-block { background: #fffbeb; }
.item-card.ok   .c-diff-block { background: #f0fdf4; }

.c-diff-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .04em;
}
.item-card.ng   .c-diff-label { color: #991b1b; }
.item-card.warn .c-diff-label { color: #92400e; }
.item-card.ok   .c-diff-label { color: #166534; }

.c-diff-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
}
.item-card.ng   .c-diff-val { color: #b91c1c; }
.item-card.warn .c-diff-val { color: #b45309; }
.item-card.ok   .c-diff-val { color: #15803d; }

/* NG は特に強調 */
.item-card.ng .c-diff-val { font-size: 32px; }

.c-status-icon {
  font-size: 14px;
  margin-left: auto;
  align-self: center;
}

/* ⑤ 補足情報 ─ 小さめ・下部 */
.c-sub-row {
  padding: 8px 16px 14px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.c-sub-item {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.c-sub-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .05em;
  color: var(--ink4);
}
.c-sub-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
}
.c-sub-item.done .c-sub-label { color: #15803d; }
.c-sub-item.done .c-sub-val   { color: #15803d; }
.c-sub-item.wip  .c-sub-label { color: #b45309; }
.c-sub-item.wip  .c-sub-val   { color: #b45309; }
.c-sub-item.ship .c-sub-label { color: #6366f1; }
.c-sub-item.ship .c-sub-val   { color: #4338ca; }

/* Buttons */
.btn-card-edit, .btn-card-del {
  border: none;
  border-radius: 5px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 11px;
  cursor: pointer;
  transition: all .12s;
  min-height: 34px;
}
.btn-card-edit { background: var(--surface); color: var(--ink3); border: 1px solid var(--border); }
.btn-card-edit:hover { background: var(--border); color: var(--ink); }
.btn-card-del  { background: var(--ng-light); color: var(--ng); }
.btn-card-del:hover { background: var(--ng-mid); }

/* ── FORM MODAL ── */
.form-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
}
.form-overlay.open { opacity: 1; pointer-events: all; }
.form-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,.5);
}
.form-sheet {
  position: relative;
  background: var(--white);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  width: 100%;
  max-width: 480px;
  padding: 20px 20px 40px;
  transform: translateY(50px);
  transition: transform .25s cubic-bezier(.32,1.2,.6,1);
  box-shadow: var(--shadow-modal);
  max-height: 90vh;
  overflow-y: auto;
}
.form-overlay.open .form-sheet { transform: translateY(0); }

.form-title {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.form-close {
  width: 28px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink3);
}
.form-close:hover { border-color: var(--ink); color: var(--ink); }

.form-field { margin-bottom: 12px; }
.form-field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.form-field input {
  width: 100%;
  padding: 11px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 16px;
  font-family: inherit;
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.form-field input:focus { border-color: var(--ink); }

.num-fields {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 18px;
}
.btn-cancel-form, .btn-save-form {
  flex: 1;
  padding: 13px;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all .15s;
}
.btn-cancel-form { background: var(--surface); color: var(--ink3); border: 1.5px solid var(--border); }
.btn-cancel-form:hover { background: var(--border); color: var(--ink); }
.btn-save-form { background: var(--ink); color: var(--white); }
.btn-save-form:hover { background: #1e293b; }
.btn-save-form:active { transform: scale(.98); }

/* ── TODAY BANNER ── */
.today-banner {
  margin: 0 16px 10px;
  padding: 8px 12px;
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 700;
  color: #0369a1;
  display: none;
  align-items: center;
  gap: 6px;
}
.today-banner.show { display: flex; }
.today-banner.ng {
  background: #fee2e2;
  border-color: #b91c1c;
  color: #b91c1c;
}

/* ── EMPTY STATE ── */
.empty-sheet {
  padding: 40px 16px;
  text-align: center;
  color: var(--ink4);
}
.empty-sheet svg { margin-bottom: 10px; }
.empty-sheet p { font-size: 13px; }

/* ── EMPTY + ADD BUTTON in sheet ── */
.empty-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 18px;
  cursor: pointer;
  transition: background .15s;
}
.empty-add-btn:hover { background: #1e293b; }

/* NG filter dim */
.cal-day.ng-filter-dim { opacity: .3; }
.urgent-strip {
  margin: 0 12px 0;
  display: none;
}
.urgent-strip.show { display: block; }
.urgent-strip-title {
  font-size: 11px;
  font-weight: 900;
  color: var(--ng);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 10px 4px 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.urgent-cards {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-bottom: 6px;
}
.urgent-card {
  background: var(--ng-light);
  border: 1.5px solid #b91c1c;
  border-radius: var(--r-sm);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: background .12s;
}
.urgent-card:hover { background: var(--ng-mid); }
.urgent-card:active { transform: scale(.98); }
.urgent-card-left { display: flex; flex-direction: column; gap: 2px; }
.urgent-card-part {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}
.urgent-card-date {
  font-size: 11px;
  color: var(--ng);
  font-weight: 700;
}
.urgent-card-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 900;
  color: var(--ng);
}
.urgent-divider {
  height: 1px;
  background: var(--border);
  margin: 0 12px 4px;
}

@media(min-width:560px) {
  .form-overlay { align-items: center; }
  .form-sheet {
    border-radius: var(--r-lg);
    transform: scale(.95);
    max-height: 80vh;
  }
  .form-overlay.open .form-sheet { transform: scale(1); }

  .detail-sheet { border-radius: var(--r-lg); max-width: 540px; margin: auto; }
  .detail-overlay { align-items: center; }
}

@media(max-width:360px) {
  .day-num { font-size: 11px; width: 20px; height: 20px; }
  .day-count { font-size: 10px; padding: 1px 4px; }
}

/* ── TODAY JUMP FAB ── */
.today-fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: 24px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  padding: 10px 16px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.22);
  z-index: 40;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.today-fab:hover { background: #1e293b; }
.today-fab:active { transform: scale(.95); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-brand">
    <h1>月間出荷予定表</h1>
  </div>
  <div class="header-actions">
    <button class="btn-add" onclick="openForm()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      追加
    </button>
  </div>
</header>

<!-- LEGEND -->
<div class="legend-strip">
  <div class="legend-item"><span class="legend-dot ok"></span>出荷OK</div>
  <div class="legend-item"><span class="legend-dot warn"></span>要注意</div>
  <div class="legend-item"><span class="legend-dot ng"></span>不足</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer">
      <input type="checkbox" id="calNgFilter" onchange="renderCalendar()" style="accent-color:#b91c1c;width:14px;height:14px">
      不足のみ
    </label>
  </div>
</div>

<!-- URGENT NG STRIP -->
<div class="urgent-strip" id="urgentStrip">
  <div class="urgent-strip-title">🚨 直近の不足案件</div>
  <div class="urgent-cards" id="urgentCards"></div>
</div>
<div class="urgent-divider" id="urgentDivider" style="display:none"></div>

<!-- CALENDAR -->
<div class="cal-wrap">
  <div class="month-nav">
    <div class="month-label" id="monthLabel"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <button class="nav-btn" onclick="goToday()">今</button>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
  </div>

  <div id="todayBanner" class="today-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="todayBannerText"></span>
  </div>

  <div class="dow-header">
    <div class="dow-cell">日</div><div class="dow-cell">月</div>
    <div class="dow-cell">火</div><div class="dow-cell">水</div>
    <div class="dow-cell">木</div><div class="dow-cell">金</div>
    <div class="dow-cell">土</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- TODAY JUMP FAB -->
<button class="today-fab" onclick="goToday()" title="今日へ">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  今日へ
</button>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-backdrop" onclick="closeDetail()"></div>
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-date" id="sheetDate"></div>
      <button class="sheet-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="sheet-filter" id="sheetFilter">
      <button class="chip-filter active" data-f="all" onclick="setSheetFilter('all',this)">すべて</button>
      <button class="chip-filter" data-f="ng"  onclick="setSheetFilter('ng',this)">🔴不足のみ</button>
    </div>
    <div class="sheet-cards" id="sheetCards"></div>
  </div>
</div>

<!-- FORM SHEET -->
<div class="form-overlay" id="formOverlay">
  <div class="form-backdrop" onclick="closeForm()"></div>
  <div class="form-sheet">
    <div class="form-title">
      <span id="formTitle">案件を追加</span>
      <button class="form-close" onclick="closeForm()">✕</button>
    </div>
    <div class="form-field">
      <label>品名</label>
      <input type="text" id="fName" placeholder="例：エンジンカバー" autocomplete="off">
    </div>
    <div class="form-field">
      <label>品番</label>
      <input type="text" id="fPartId" placeholder="例：A-1234" autocomplete="off" autocapitalize="characters">
    </div>
    <div class="form-field">
      <label>出荷日</label>
      <input type="date" id="fDate">
    </div>
    <div class="num-fields">
      <div class="form-field">
        <label>出荷数</label>
        <input type="number" id="fShip" placeholder="0" min="0" inputmode="numeric">
      </div>
      <div class="form-field">
        <label>完成品</label>
        <input type="number" id="fDone" placeholder="0" min="0" inputmode="numeric">
      </div>
      <div class="form-field">
        <label>仕掛品</label>
        <input type="number" id="fWip"  placeholder="0" min="0" inputmode="numeric">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel-form" onclick="closeForm()">キャンセル</button>
      <button class="btn-save-form"   onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const KEY = 'sc_items_v1';
let items = [];
let editId = null;
let viewYear, viewMonth;   // 0-indexed month
let selectedDate = null;   // 'YYYY-MM-DD'
let sheetFilter = 'all';

const todayStr = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function load() {
  try { items = JSON.parse(localStorage.getItem(KEY)) || seed(); }
  catch { items = seed(); }
}
function persist() { localStorage.setItem(KEY, JSON.stringify(items)); }

function seed() {
  const [y,m,d] = todayStr.split('-').map(Number);
  const fmt = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const today = fmt(y,m,d);
  const plus = n => { const t=new Date(y,m-1,d+n); return fmt(t.getFullYear(),t.getMonth()+1,t.getDate()); };
  return [
    {id:uid(), name:'エンジンカバー',   partId:'A-1001', date:today,   ship:100, done:80,  wip:30},
    {id:uid(), name:'ブラケット',       partId:'B-2045', date:today,   ship:200, done:200, wip:0 },
    {id:uid(), name:'ギアケース',       partId:'C-3320', date:plus(2), ship:150, done:60,  wip:50},
    {id:uid(), name:'シリンダーヘッド', partId:'D-4788', date:plus(2), ship:80,  done:80,  wip:10},
    {id:uid(), name:'オイルパン',       partId:'E-5512', date:plus(5), ship:120, done:40,  wip:20},
    {id:uid(), name:'クランクシャフト', partId:'F-6001', date:plus(7), ship:50,  done:50,  wip:5 },
  ];
}

/* ═══════════════════════════════════════
   LOGIC
═══════════════════════════════════════ */
function judge(it) {
  if (it.done >= it.ship) return 'ok';
  if (it.done + it.wip >= it.ship) return 'warn';
  return 'ng';
}
function diff(it) { return it.done + it.wip - it.ship; }

// worst status for a group of items
function worstStatus(arr) {
  if (arr.some(i => judge(i)==='ng'))   return 'ng';
  if (arr.some(i => judge(i)==='warn')) return 'warn';
  return 'ok';
}

/* ═══════════════════════════════════════
   CALENDAR RENDER
═══════════════════════════════════════ */
function renderCalendar() {
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${viewYear}年 ${monthNames[viewMonth]}`;

  // Build date→items map for this month
  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay  = new Date(viewYear, viewMonth+1, 0);
  const dow0 = firstDay.getDay(); // 0=Sun

  // Today banner: count today's ng items
  const todayItems = items.filter(i => i.date === todayStr);
  const banner = document.getElementById('todayBanner');
  const ngToday = todayItems.filter(i => judge(i)==='ng').length;
  if (todayItems.length > 0) {
    banner.classList.add('show');
    banner.classList.toggle('ng', ngToday > 0);
    document.getElementById('todayBannerText').textContent =
      ngToday > 0
        ? `🚨 今日の出荷 ${todayItems.length}件 ／ 不足 ${ngToday}件`
        : `✅ 今日の出荷 ${todayItems.length}件 ／ すべて出荷OK`;
  } else {
    banner.classList.remove('show');
    banner.classList.remove('ng');
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Empty cells before month start
  for (let i=0; i<dow0; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=lastDay.getDate(); d++) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = items.filter(i => i.date === dateStr);
    const dow = new Date(viewYear, viewMonth, d).getDay();

    // Cal-side NG filter
    const ngFilterOn = document.getElementById('calNgFilter').checked;
    if (ngFilterOn && dayItems.length > 0 && worstStatus(dayItems) !== 'ng') {
      // show greyed-out non-ng days
    }

    const el = document.createElement('div');
    let cls = 'cal-day';
    if (dateStr === todayStr) cls += ' today';
    if (dow===0) cls += ' sunday';
    if (dow===6) cls += ' saturday';

    if (dayItems.length > 0) {
      const ws = worstStatus(dayItems);
      cls += ` has-${ws}`;
      // Dim non-ng days when filter is on
      if (ngFilterOn && ws !== 'ng') cls += ' ng-filter-dim';
    }
    el.className = cls;
    el.setAttribute('data-date', dateStr);

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    // Count badge (replaces dots)
    if (dayItems.length > 0) {
      const ws = worstStatus(dayItems);
      const badge = document.createElement('div');
      badge.className = `day-count ${ws}`;
      badge.textContent = dayItems.length;
      el.appendChild(badge);
    }
    // ② ③ All days are tappable
    el.onclick = () => openDetail(dateStr);

    grid.appendChild(el);
  }
  renderUrgentStrip();
}

/* ═══════════════════════════════════════
   URGENT STRIP
═══════════════════════════════════════ */
function renderUrgentStrip() {
  const ngItems = items
    .filter(i => judge(i) === 'ng' && i.date >= todayStr)
    .sort((a,b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return diff(a) - diff(b);
    })
    .slice(0, 3);

  const strip = document.getElementById('urgentStrip');
  const divider = document.getElementById('urgentDivider');

  if (ngItems.length === 0) {
    strip.classList.remove('show');
    divider.style.display = 'none';
    return;
  }
  strip.classList.add('show');
  divider.style.display = 'block';

  document.getElementById('urgentCards').innerHTML = ngItems.map(it => {
    const d = diff(it);
    const [y,m,day] = it.date.split('-').map(Number);
    const dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,day).getDay()];
    const isToday = it.date === todayStr;
    const dateLabel = isToday ? '今日' : `${m}/${day}（${dow}）`;
    return `<div class="urgent-card" onclick="openDetail('${it.date}')">
      <div class="urgent-card-left">
        <span class="urgent-card-part">${escHtml(it.name || it.partId)}</span>
        <span class="urgent-card-date">${dateLabel}</span>
      </div>
      <span class="urgent-card-right">${d} 不足</span>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════ */
function openDetail(dateStr) {
  selectedDate = dateStr;
  sheetFilter = 'all';
  document.querySelectorAll('.chip-filter').forEach(b=>{
    b.classList.toggle('active', b.dataset.f==='all');
  });

  const [y,m,d] = dateStr.split('-').map(Number);
  const dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  const isToday = dateStr === todayStr;
  document.getElementById('sheetDate').innerHTML =
    `${m}月${d}日（${dow}）${isToday ? '<span style="font-size:11px;background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:6px">TODAY</span>' : ''}`;

  renderSheetCards();
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function setSheetFilter(f, btn) {
  sheetFilter = f;
  document.querySelectorAll('.chip-filter').forEach(b=>b.classList.toggle('active', b.dataset.f===f));
  renderSheetCards();
}
function renderSheetCards() {
  const allDayItems = items.filter(i => i.date === selectedDate);
  const dayItems = allDayItems
    .filter(i => sheetFilter==='all' || judge(i)===sheetFilter)
    .sort((a,b) => diff(a) - diff(b));

  const cont = document.getElementById('sheetCards');

  // ③ Empty day: show message + add button
  if (allDayItems.length === 0) {
    const [y,m,d] = selectedDate.split('-').map(Number);
    cont.innerHTML = `<div class="empty-sheet">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>この日の出荷予定はありません</p>
      <button class="empty-add-btn" onclick="openForm('${selectedDate}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        この日に追加する
      </button>
    </div>`;
    return;
  }

  if (dayItems.length === 0) {
    cont.innerHTML = `<div class="empty-sheet">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>不足案件はありません</p></div>`;
    return;
  }

  cont.innerHTML = dayItems.map((it,idx) => {
    const s = judge(it);
    const d = diff(it);
    const statusIcon = { ok:'🟢', warn:'🟡', ng:'🔴' }[s];
    const diffLabel  = s === 'ng' ? '不足' : s === 'warn' ? '要注意' : '余剰';
    const diffVal    = s === 'ng'
      ? Math.abs(d)
      : s === 'warn'
        ? (d === 0 ? '±0' : (d > 0 ? `+${d}` : d))
        : (d === 0 ? '±0' : d);

    // Date badge class
    const dc = it.date < todayStr ? 'past-date' : it.date === todayStr ? 'today-date' : '';
    const [dy,dm,dd] = it.date.split('-').map(Number);
    const dateLabel = `${dm}/${dd} 出荷`;

    const displayName = escHtml(it.name || it.partId);
    const displayCode = it.name ? escHtml(it.partId) : '';

    return `<div class="item-card ${s}" style="animation-delay:${idx*50}ms">

      <!-- ① 品名 + アクションボタン -->
      <div class="c-name-row">
        <span class="c-name">${displayName}</span>
        <div class="c-actions">
          <button class="btn-card-edit" onclick="openEdit('${it.id}')">✏ 編集</button>
          <button class="btn-card-del"  onclick="deleteItem('${it.id}')">削除</button>
        </div>
      </div>

      <!-- ② 品番 + ③ 出荷日 -->
      <div class="c-code-row">
        ${displayCode ? `<span class="c-code">${displayCode}</span>` : ''}
        <span class="c-date-badge ${dc}">${dateLabel}</span>
      </div>

      <!-- ④ 不足数ブロック（最重要） -->
      <div class="c-diff-block">
        <span class="c-diff-label">${diffLabel}</span>
        <span class="c-diff-val">${diffVal}</span>
        <span class="c-status-icon">${statusIcon}</span>
      </div>

      <!-- ⑤ 補足情報（小さめ） -->
      <div class="c-sub-row">
        <div class="c-sub-item ship">
          <span class="c-sub-label">出荷数</span>
          <span class="c-sub-val">${it.ship.toLocaleString()}</span>
        </div>
        <div class="c-sub-item done">
          <span class="c-sub-label">完成品</span>
          <span class="c-sub-val">${it.done.toLocaleString()}</span>
        </div>
        <div class="c-sub-item wip">
          <span class="c-sub-label">仕掛品</span>
          <span class="c-sub-val">${it.wip.toLocaleString()}</span>
        </div>
      </div>

    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   FORM
═══════════════════════════════════════ */
function openForm(prefillDate) {
  editId = null;
  document.getElementById('formTitle').textContent = '案件を追加';
  document.getElementById('fName').value  = '';
  document.getElementById('fPartId').value = '';
  document.getElementById('fDate').value = prefillDate || todayStr;
  document.getElementById('fShip').value = '';
  document.getElementById('fDone').value = '0';
  document.getElementById('fWip').value  = '0';
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('fName').focus(), 300);
}
function openEdit(id) {
  const it = items.find(i => i.id===id);
  if (!it) return;
  editId = id;
  document.getElementById('formTitle').textContent = '案件を編集';
  document.getElementById('fName').value   = it.name || '';
  document.getElementById('fPartId').value = it.partId;
  document.getElementById('fDate').value   = it.date;
  document.getElementById('fShip').value   = it.ship;
  document.getElementById('fDone').value   = it.done;
  document.getElementById('fWip').value    = it.wip;
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function saveItem() {
  const name   = document.getElementById('fName').value.trim();
  const partId = document.getElementById('fPartId').value.trim();
  const date   = document.getElementById('fDate').value;
  const ship   = parseInt(document.getElementById('fShip').value) || 0;
  const done   = parseInt(document.getElementById('fDone').value) || 0;
  const wip    = parseInt(document.getElementById('fWip').value)  || 0;
  if (!partId || !date) {
    alert('品番と出荷日は必須です');
    return;
  }
  if (editId) {
    const idx = items.findIndex(i => i.id===editId);
    if (idx>=0) items[idx] = { id:editId, name, partId, date, ship, done, wip };
  } else {
    items.push({ id:uid(), name, partId, date, ship, done, wip });
  }
  persist();
  closeForm();

  // Update view to show the saved item's month
  const [y,m] = date.split('-').map(Number);
  viewYear  = y;
  viewMonth = m-1;
  renderCalendar();

  // ⑥ Always open detail for the saved date
  openDetail(date);
}
function deleteItem(id) {
  if (!confirm('この案件を削除しますか？')) return;
  items = items.filter(i => i.id!==id);
  persist();
  renderCalendar();
  if (selectedDate) renderSheetCards();
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
function prevMonth() {
  if (viewMonth===0) { viewYear--; viewMonth=11; }
  else viewMonth--;
  renderCalendar();
}
function nextMonth() {
  if (viewMonth===11) { viewYear++; viewMonth=0; }
  else viewMonth++;
  renderCalendar();
}
function goToday() {
  const t = new Date();
  viewYear  = t.getFullYear();
  viewMonth = t.getMonth();
  renderCalendar();
}

/* ═══════════════════════════════════════
   UTIL
═══════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
load();
const now = new Date();
viewYear  = now.getFullYear();
viewMonth = now.getMonth();
renderCalendar();
</script>
</body>
</html>
