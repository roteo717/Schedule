<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷・在庫管理</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;font-size:13px;background:#f4f6f5;color:#1a1a1a;min-height:100vh}
.app-header{background:#1a6b45;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:50}
.app-logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.header-actions{display:flex;gap:8px}
.hbtn{padding:5px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn.primary{background:#fff;color:#1a6b45;border-color:#fff;font-weight:700}
.hbtn.primary:hover{background:#e6f4ed}
.tab-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;position:sticky;top:52px;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab-btn{padding:12px 20px;font-size:13px;font-weight:600;color:#999;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn.active{color:#1a6b45;border-bottom-color:#1a6b45}
.tab-btn:hover:not(.active){color:#555}
.main{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-title{font-size:17px;font-weight:700;color:#1a1a1a}
.nav-group{display:flex;align-items:center;gap:6px;margin-left:auto}
.nbtn{width:30px;height:30px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#444}
.nbtn:hover{background:#f0f0f0}
.month-label{font-size:15px;font-weight:700;min-width:110px;text-align:center;color:#1a1a1a}
.today-btn{padding:5px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#444}
.today-btn:hover{background:#f0f0f0}
.cal-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.dow-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:#f7f9f8;border-bottom:1px solid #e0e8e4}
.dow{padding:8px;font-size:11px;font-weight:700;color:#666;text-align:center;letter-spacing:.5px}
.dow.sun{color:#c0392b}.dow.sat{color:#1a6b45}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.cell{min-height:108px;border-right:1px solid #e8eee9;border-bottom:1px solid #e8eee9;padding:6px}
.cell:nth-child(7n){border-right:none}
.cell.other{background:#fafafa}
.cell.today-cell{background:#f0faf4}
.day-num{font-size:12px;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px;color:#333}
.cell.today-cell .day-num{background:#1a6b45;color:#fff}
.day-num.sun-c{color:#c0392b}
.day-num.sat-c{color:#1a6b45}
.cell.other .day-num{color:#bbb}
.chip{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.6;display:block}
.chip:hover{opacity:.82}
.chip.warn-stock{outline:2px solid #dc2626;outline-offset:-1px}
.chip.shipped{text-decoration:line-through;opacity:.45}
.more-tag{font-size:10px;color:#888;cursor:pointer;margin-top:1px;padding:1px 4px}
.more-tag:hover{color:#1a6b45}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding:10px 14px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:17px;font-weight:700;color:#1a1a1a}
.totals-bar{display:flex;gap:10px;flex-wrap:wrap}
.total-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.total-pill.fin{background:#e6f4ed;color:#1a6b45}
.total-pill.wip{background:#fff7ed;color:#d97706}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.prod-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px 18px;border:1px solid #e8e8e8}
.prod-name{font-size:14px;font-weight:700;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.stock-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sbox{border-radius:8px;padding:10px 12px}
.sbox.fin{background:#e6f4ed;border:1px solid #a7d9bc}
.sbox.wip{background:#fff7ed;border:1px solid #fed7aa}
.sbox-label{font-size:10px;font-weight:700;letter-spacing:.4px;margin-bottom:3px}
.sbox-label.fin{color:#1a6b45}
.sbox-label.wip{color:#d97706}
.sbox-val{font-size:22px;font-weight:700;line-height:1}
.sbox-val.fin{color:#1a6b45}
.sbox-val.wip{color:#d97706}
.sbox-unit{font-size:11px;font-weight:400;color:#888;margin-left:2px}
.proc-section{margin-bottom:10px}
.proc-label{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.5px;margin-bottom:5px}
.proc-row{display:flex;gap:3px}
.proc-box{flex:1;display:flex;flex-direction:column;align-items:center;background:#f5f5f5;border-radius:6px;padding:5px 3px;border:1px solid #e5e5e5;min-width:0}
.proc-box.active{background:#fff7ed;border-color:#fbbf24}
.proc-step{font-size:9px;font-weight:700;color:#bbb;margin-bottom:2px}
.proc-step.active{color:#d97706}
.proc-qty{font-size:12px;font-weight:700;color:#ccc}
.proc-qty.active{color:#d97706}
.avail-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;margin-bottom:10px}
.avail-bar.ok{background:#e6f4ed}
.avail-bar.warn{background:#fef2f2}
.avail-label{font-size:11px;font-weight:700}
.avail-label.ok{color:#1a6b45}
.avail-label.warn{color:#dc2626}
.avail-qty{font-size:14px;font-weight:700}
.avail-qty.ok{color:#1a6b45}
.avail-qty.warn{color:#dc2626}
.comp-btn{width:100%;padding:8px;border-radius:7px;border:none;background:#d97706;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.comp-btn:hover{background:#b45309}
.comp-btn:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:14px;padding:22px 24px;width:380px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:#111;margin-top:4px}
.modal-close{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#555;border:none;flex-shrink:0}
.modal-close:hover{background:#e0e0e0}
.mrow{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.mrow:last-child{border-bottom:none}
.mkey{color:#999;min-width:80px;font-size:11px;padding-top:2px;font-weight:600}
.mval{color:#111;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:6px}
.wip-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.wip-chip{background:#fff7ed;border:1px solid #fed7aa;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:700;color:#d97706}
.stock-status{border-radius:7px;padding:7px 10px;font-size:12px;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:5px}
.stock-status.ok{background:#e6f4ed;color:#1a6b45}
.stock-status.warn{background:#fef2f2;color:#dc2626}
.edit-panel{position:fixed;right:0;top:0;height:100%;width:340px;max-width:96vw;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.14);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.edit-panel.open{transform:translateX(0)}
.ep-hdr{padding:16px 18px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;background:#1a6b45;color:#fff}
.ep-title{font-size:14px;font-weight:700}
.ep-close{background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;cursor:pointer;padding:4px 10px;font-size:14px}
.ep-body{flex:1;overflow-y:auto;padding:16px 18px}
.ep-foot{padding:14px 18px;border-top:1px solid #e8e8e8;display:flex;gap:8px}
label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:4px;margin-top:12px;letter-spacing:.3px}
label:first-child{margin-top:0}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:8px 10px;border:1px solid #d0d0d0;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#111;outline:none}
input:focus,select:focus{border-color:#1a6b45;box-shadow:0 0 0 3px rgba(26,107,69,.12)}
.btn{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700}
.btn-primary{background:#1a6b45;color:#fff}
.btn-primary:hover{background:#155836}
.btn-del{background:#fef2f2;color:#c0392b;border:1px solid #fca5a5}
.btn-del:hover{background:#fee2e2}
.btn-cancel{background:#f3f4f6;color:#444;border:1px solid #e0e0e0}
.btn-cancel:hover{background:#e5e7eb}
.srow{display:flex;align-items:center;gap:3px;padding:3px 5px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:2px;user-select:none;transition:filter .1s;white-space:nowrap;overflow:hidden}
.srow:hover{filter:brightness(.9)}
.srow.ng{background:#fee2e2;color:#dc2626}
.srow.cond{background:#fef9c3;color:#a16207}
.srow.ok{background:#dcfce7;color:#166534}
.srow-icon{flex-shrink:0;font-size:9px;line-height:1}
.srow-label{flex-shrink:0}
.srow-count{flex-shrink:0}
@media(max-width:640px){
  .cell{min-height:64px;padding:4px 2px}
  .day-num{font-size:11px;width:20px;height:20px;margin-bottom:2px}
  .srow{padding:2px 4px;font-size:9px;gap:2px;margin-bottom:1px;border-radius:4px}
  .srow-label{display:none}
}
.slist-wrap{background:#fff;border-radius:14px;padding:20px 22px;width:420px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.2);max-height:80vh;overflow-y:auto}
.slist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.slist-title{font-size:15px;font-weight:700;color:#111}
.slist-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.slist-item:last-child{border-bottom:none}
.slist-item:hover{background:#fafafa;margin:0 -8px;padding:8px 8px;border-radius:6px}
.slist-icon{font-size:14px;flex-shrink:0}
.slist-name{font-size:13px;font-weight:700;color:#111;flex:1;min-width:0}
.slist-sub{font-size:11px;color:#888;white-space:nowrap}
.slist-empty{text-align:center;color:#aaa;font-size:13px;padding:24px 0}
@media(max-width:640px){
  .modal-bg.slist-bg{align-items:flex-end}
  .slist-wrap{width:100%;border-radius:16px 16px 0 0;padding:16px 16px 36px;max-height:72vh}
}
.fab{position:fixed;bottom:28px;right:24px;width:52px;height:52px;border-radius:50%;background:#1a6b45;color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(26,107,69,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.fab:hover{background:#155836;transform:scale(1.06)}
@media print{.app-header .header-actions,.fab,.edit-panel,.tab-bar{display:none!important}body{background:#fff}.main{padding:10px}}
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:9px 36px 9px 14px;border:1px solid #d0d0d0;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#111;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.search-input:focus{border-color:#1a6b45;box-shadow:0 0 0 3px rgba(26,107,69,.12)}
.search-icon{position:absolute;left:11px;top:0;bottom:0;display:flex;align-items:center;pointer-events:none;line-height:1}
.search-icon svg{display:block;width:16px;height:16px;color:#aaa}
.search-clear{position:absolute;right:10px;top:0;bottom:0;display:flex;align-items:center;background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;padding:0 4px;line-height:1}
.search-clear:hover{color:#555}
.sresult-list{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.sresult-hdr{padding:10px 16px;background:#f7f9f8;border-bottom:1px solid #e8eee9;font-size:12px;font-weight:700;color:#666}
.sresult-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.sresult-item:last-child{border-bottom:none}
.sresult-item:hover{background:#f9fafb}
.sresult-date{font-size:11px;color:#aaa;min-width:90px;flex-shrink:0}
.sresult-name{font-size:13px;font-weight:700;color:#111;flex:1;min-width:0}
.sresult-qty{font-size:12px;color:#888;font-weight:600;white-space:nowrap}
.sresult-st{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sresult-empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px}
@media(max-width:640px){.search-input{font-size:16px}}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <div class="logo-icon">📦</div>出荷・在庫管理
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="window.print()">🖨 印刷</button>
    <button class="hbtn primary" onclick="openAdd()">＋ 出荷追加</button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-cal">📅 出荷予定</button>
</div>

<div id="tab-cal">
  <div class="main">
    <div class="toolbar">
      <div class="page-title">月間出荷予定表</div>
      <div class="nav-group">
        <button class="today-btn" onclick="goToday()">今月</button>
        <button class="nbtn" onclick="prevMonth()">&#8249;</button>
        <div class="month-label" id="mlabel"></div>
        <button class="nbtn" onclick="nextMonth()">&#8250;</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="品名・品番で検索" oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" style="display:none" onclick="clearSearch()">✕</button>
    </div>
    <div id="search-results" style="display:none;margin-bottom:14px"></div>
    <div id="cal-area">
    <div class="cal-card">
      <div class="dow-row">
        <div class="dow sun">日</div><div class="dow">月</div><div class="dow">火</div>
        <div class="dow">水</div><div class="dow">木</div><div class="dow">金</div>
        <div class="dow sat">土</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    </div>

  </div>
</div>


<button class="fab" id="fab" onclick="openAdd()">＋</button>
<div id="modal-wrap"></div>

<div class="edit-panel" id="edit-panel">
  <div class="ep-hdr">
    <div class="ep-title" id="ep-title">出荷を追加</div>
    <button class="ep-close" onclick="closePanel()">✕</button>
  </div>
  <div class="ep-body">
    <input type="hidden" id="ep-idx" value="-1">
    <input type="hidden" id="ep-cat" value="">
    <label>出荷日</label><input type="date" id="ep-date">

    <label>品番・製品名</label><input type="text" id="ep-item" placeholder="例：製品α-100">
    <label>数量（個）</label><input type="number" id="ep-qty" min="1" placeholder="例：100">
    <label>出荷先</label><input type="text" id="ep-dest" placeholder="例：東京倉庫">
    <label>備考</label><input type="text" id="ep-note" placeholder="任意">
    <div id="ep-stock-info" style="margin-top:12px"></div>
  </div>
  <div class="ep-foot" id="ep-foot"></div>
</div>
<div id="panel-bg" style="display:none;position:fixed;inset:0;z-index:299;background:rgba(0,0,0,.2)" onclick="closePanel()"></div>

<script>
/* ========== DATA ==========
   ルール:
   - process[0..5] = 工程①〜⑥ → すべて仕掛品(WIP)
   - stock = 完成品（工程⑥完了操作後のみ加算）
   - 出荷は stock からのみ減算（仕掛品からの出荷禁止）
*/
let CATS=[
  {id:'A',label:'得意先 AAA',bg:'#dbeafe',tc:'#1e40af',prodId:'alpha'},
  {id:'B',label:'得意先 BBB',bg:'#dcfce7',tc:'#166534',prodId:'beta'},
  {id:'C',label:'得意先 CCC',bg:'#fef9c3',tc:'#854d0e',prodId:'gamma'},
  {id:'D',label:'得意先 DDD',bg:'#ffe4e6',tc:'#9f1239',prodId:'delta'},
  {id:'E',label:'得意先 EEE',bg:'#f3e8ff',tc:'#6b21a8',prodId:'eps'},
  {id:'F',label:'得意先 FFF',bg:'#ffedd5',tc:'#9a3412',prodId:'zeta'},
];
let catMap=Object.fromEntries(CATS.map(c=>[c.id,c]));
function rebuildCatMap(){catMap=Object.fromEntries(CATS.map(c=>[c.id,c]));}
const COLOR_PRESETS=[
  {name:'青',bg:'#dbeafe',tc:'#1e40af'},{name:'緑',bg:'#dcfce7',tc:'#166534'},
  {name:'黄',bg:'#fef9c3',tc:'#854d0e'},{name:'赤',bg:'#ffe4e6',tc:'#9f1239'},
  {name:'紫',bg:'#f3e8ff',tc:'#6b21a8'},{name:'橙',bg:'#ffedd5',tc:'#9a3412'},
  {name:'水',bg:'#cffafe',tc:'#155e75'},{name:'桃',bg:'#fce7f3',tc:'#9d174d'},
  {name:'灰',bg:'#f1f5f9',tc:'#334155'},{name:'茶',bg:'#fdf2e9',tc:'#7d4f00'},
];

let PRODUCTS=[
  {id:'alpha',name:'製品α',stock:650,process:[20,15,10,25, 8,12]},
  {id:'beta', name:'製品β',stock:600,process:[30, 0,20,15,10, 5]},
  {id:'gamma',name:'製品γ',stock:750,process:[ 0,25,30,10, 0,20]},
  {id:'delta',name:'製品δ',stock:290,process:[10,10, 5,15,20,10]},
  {id:'eps',  name:'製品ε',stock:250,process:[ 5, 0,10, 8,12, 0]},
  {id:'zeta', name:'製品ζ',stock:140,process:[ 0, 5, 8, 0,10, 5]},
];
const prodMap=Object.fromEntries(PRODUCTS.map(p=>[p.id,p]));

let SHIPS=[
  {d:[2026,4, 1],cat:'A',item:'製品α-100',qty:120,dest:'東京倉庫',note:'',shipped:false},
  {d:[2026,4, 1],cat:'D',item:'製品δ-400',qty: 60,dest:'大阪港',  note:'',shipped:false},
  {d:[2026,4, 2],cat:'B',item:'製品β-200',qty: 80,dest:'名古屋DC',note:'',shipped:false},
  {d:[2026,4, 3],cat:'C',item:'製品γ-300',qty:200,dest:'福岡倉庫',note:'',shipped:false},
  {d:[2026,4, 4],cat:'E',item:'製品ε-500',qty: 50,dest:'仙台倉庫',note:'',shipped:false},

/* ========== WIP / STOCK LOGIC ==========
   wip = 工程①〜⑥の合計（仕掛品）
   available = stock(完成品) - 未出荷引当分
   仕掛品は引当不可・出荷不可
*/
const SL=['①','②','③','④','⑤','⑥'];
function getWip(p){return p.process.reduce((a,b)=>a+b,0)}
function getReserved(prodId){return SHIPS.filter(s=>!s.shipped&&catMap[s.cat].prodId===prodId).reduce((a,s)=>a+s.qty,0)}
function getAvailable(prodId){return prodMap[prodId].stock-getReserved(prodId)}

let cur=new Date(2026,3,1);
const today=new Date();
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}

/* ========== STATUS LOGIC ========== */
function getShipStatus(s){
  const c=catMap[s.cat];if(!c)return'ok';
  const p=prodMap[c.prodId];if(!p)return'ok';
  if(p.stock>=s.qty)return'ok';
  if(p.stock+getWip(p)>=s.qty)return'cond';
  return'ng';
}
const STATUS_META={ng:{icon:'🔴',label:'不足',cls:'ng'},cond:{icon:'🟡',label:'条件OK',cls:'cond'},ok:{icon:'🟢',label:'OK',cls:'ok'}};

/* ========== CALENDAR ========== */
function renderCal(){
  const y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('mlabel').textContent=y+'年'+(m+1)+'月';
  const byDay={};
  SHIPS.forEach((s,i)=>{if(s.d[0]===y&&s.d[1]===(m+1)){(byDay[s.d[2]]=byDay[s.d[2]]||[]).push(i)}});
  const sd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate();
  const total=Math.ceil((sd+dim)/7)*7;
  let html='';
  for(let i=0;i<total;i++){
    let day,oth=false;
    if(i<sd){day=pd-sd+i+1;oth=true;}
    else if(i>=sd+dim){day=i-sd-dim+1;oth=true;}
    else day=i-sd+1;
    const dow=i%7,isT=!oth&&sameDay(new Date(y,m,day),today);
    const di=(!oth&&byDay[day])||[];
    const nc=dow===0?'sun-c':dow===6?'sat-c':'';
    html+=`<div class="cell${oth?' other':''}${isT?' today-cell':''}"><div class="day-num ${nc}">${day}</div>`;
    if(!oth&&di.length>0){
      const counts={ng:0,cond:0,ok:0};
      di.forEach(idx=>{
        const s=SHIPS[idx];
        if(!s.shipped)counts[getShipStatus(s)]++;
        else counts.ok++; // 出荷済はOK扱い
      });
      ['ng','cond','ok'].forEach(st=>{
        if(counts[st]>0){
          const meta=STATUS_META[st];
          html+=`<div class="srow ${meta.cls}" data-y="${y}" data-m="${m+1}" data-d="${day}" data-st="${st}"><span class="srow-icon">${meta.icon}</span><span class="srow-label">${meta.label}</span><span class="srow-count"> ${counts[st]}件</span></div>`;
        }
      });
    }
    html+='</div>';
  }
  document.getElementById('grid').innerHTML=html;
  document.getElementById('grid').addEventListener('click',e=>{
    const row=e.target.closest('.srow');
    if(row)showStatusList(+row.dataset.y,+row.dataset.m,+row.dataset.d,row.dataset.st);
  },{once:false});

}

function showStatusList(y,m,d,st){
  const meta=STATUS_META[st];
  const items=SHIPS.map((s,i)=>({s,i})).filter(({s})=>{
    if(s.d[0]!==y||s.d[1]!==m||s.d[2]!==d)return false;
    const sst=s.shipped?'ok':getShipStatus(s);
    return sst===st;

  const dateLabel=`${y}年${m}月${d}日（${dows[new Date(y,m-1,d).getDay()]}）`;

function doComplete(prodId){
  const p=prodMap[prodId];
  const qty=parseInt(document.getElementById('comp-qty').value);
  if(!qty||qty<1){alert('数量を入力してください');return;}
  if(qty>p.process[5]){alert(`工程⑥の仕掛品（${p.process[5]}個）を超えています`);return;}
  p.process[5]-=qty;  // 工程⑥から減算
  p.stock+=qty;       // 完成品に加算
  closeModal();render();
  setTimeout(()=>{
    document.getElementById('modal-wrap').innerHTML=`
      <div class="modal-bg" id="mbg">
        <div class="modal" style="text-align:center;padding:28px 24px">
          <div style="font-size:36px;margin-bottom:8px">✅</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:6px">${qty.toLocaleString()}個 を完成品に移動しました</div>
          <div style="font-size:13px;color:#666;margin-bottom:14px">${p.name}</div>
          <div style="display:flex;justify-content:center;gap:24px;font-size:13px;margin-bottom:18px">
            <span style="color:#1a6b45;font-weight:700">完成品：${p.stock.toLocaleString()}個</span>
            <span style="color:#d97706;font-weight:700">仕掛品：${getWip(p)}個</span>
          </div>
          <button class="btn btn-primary" onclick="closeModal()" style="width:120px;display:inline-block">閉じる</button>
        </div>
      </div>`;
  },10);
}

/* ===== 出荷済処理（完成品のみ） ===== */
function markShipped(idx){
  const s=SHIPS[idx],p=prodMap[catMap[s.cat].prodId];
  // 仕掛品からの出荷は絶対禁止 — 完成品在庫のみ使用可能
  if(p.stock<s.qty){
    alert(`⚠ 出荷できません\n\n完成品在庫：${p.stock.toLocaleString()}個\n出荷要求数：${s.qty.toLocaleString()}個\n\n※仕掛品（工程中の品）からの出荷は禁止されています。\n工程⑥完了操作で完成品へ移動してから出荷してください。`);
    return;
  }
  if(!confirm(`出荷済にしますか？\n\n完成品在庫 ${p.stock.toLocaleString()}個 → ${(p.stock-s.qty).toLocaleString()}個`))return;
  p.stock-=s.qty;  // 完成品在庫から減算（仕掛品は変動しない）
  s.shipped=true;
  closeModal();render();
}

function deleteShip(idx){
  if(!confirm('この出荷予定を削除しますか？'))return;
  SHIPS.splice(idx,1);closeModal();render();
}

    </div>`;
}

function saveShip(){
  const dateVal=document.getElementById('ep-date').value;
  const cat=document.getElementById('ep-cat').value;
  const item=document.getElementById('ep-item').value.trim();
  const qty=parseInt(document.getElementById('ep-qty').value);
  const dest=document.getElementById('ep-dest').value.trim();
  const note=document.getElementById('ep-note').value.trim();
  if(!dateVal||!cat||!item||!qty||!dest){alert('必須項目をすべて入力してください');return;}
  const avail=getAvailable(catMap[cat].prodId);
  if(avail<qty&&!confirm(`⚠ 完成品在庫が不足しています。\n引当可能：${avail}個 / 要求：${qty}個\n\n仕掛品からの出荷は実行できません。\n予定として登録しますか？`))return;
  const parts=dateVal.split('-').map(Number);
  const idx=+document.getElementById('ep-idx').value;
  if(idx>=0)SHIPS[idx]={d:parts,cat,item,qty,dest,note,shipped:false};
  else SHIPS.push({d:parts,cat,item,qty,dest,note,shipped:false});
  SHIPS.sort((a,b)=>a.d[0]-b.d[0]||a.d[1]-b.d[1]||a.d[2]-b.d[2]);
  closePanel();render();
}

/* ========== 取引先管理 ========== */
function openCatManager(){
  const rows=CATS.map((c,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0">
      <span style="background:${c.bg};color:${c.tc};border-radius:5px;padding:3px 10px;font-size:12px;font-weight:700;flex-shrink:0">${c.label}</span>
      <span style="font-size:11px;color:#aaa;flex:1">${PRODUCTS.find(p=>p.id===c.prodId)?.name||'?'}</span>
      <button onclick="openCatForm(${i})" style="padding:4px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:12px;font-family:inherit">編集</button>
      <button onclick="deleteCat(${i})" style="padding:4px 10px;border-radius:6px;border:1px solid #fca5a5;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:12px;font-family:inherit">削除</button>
    </div>`).join('');
  document.getElementById('modal-wrap').innerHTML=`
    <div class="modal-bg" id="mbg">
      <div class="modal" style="width:440px">
        <div class="modal-head">
          <div class="modal-title">🏢 取引先管理</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div style="max-height:55vh;overflow-y:auto">${rows||'<div style="color:#aaa;text-align:center;padding:20px">取引先がありません</div>'}</div>
        <div style="margin-top:14px">
          <button onclick="openCatForm(-1)" style="width:100%;padding:9px;border-radius:8px;border:2px dashed #1a6b45;background:#f0faf4;color:#1a6b45;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">＋ 取引先を追加</button>
        </div>
      </div>
    </div>`;
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal()});
}

function openCatForm(idx){
  const isNew=idx<0;
  const c=isNew?{label:'',bg:COLOR_PRESETS[0].bg,tc:COLOR_PRESETS[0].tc,prodId:PRODUCTS[0]?.id||''}:CATS[idx];
  const colorBtns=COLOR_PRESETS.map((cp,ci)=>`
    <button type="button" id="cpbtn-${ci}" onclick="selectColor(${ci})"
      style="width:32px;height:32px;border-radius:6px;background:${cp.bg};color:${cp.tc};font-size:11px;font-weight:700;cursor:pointer;border:2px solid ${cp.bg===c.bg?cp.tc:'transparent'};font-family:inherit">${cp.name}</button>`).join('');
  const prodOpts=PRODUCTS.map(p=>`<option value="${p.id}"${p.id===c.prodId?' selected':''}>${p.name}</option>`).join('');
  document.getElementById('modal-wrap').innerHTML=`
    <div class="modal-bg" id="mbg2">
      <div class="modal" style="width:380px">
        <div class="modal-head">
          <div class="modal-title">${isNew?'取引先を追加':'取引先を編集'}</div>
          <button class="modal-close" onclick="openCatManager()">✕</button>
        </div>
        <input type="hidden" id="cf-idx" value="${idx}">
        <input type="hidden" id="cf-bg" value="${c.bg}">
        <input type="hidden" id="cf-tc" value="${c.tc}">
        <label style="margin-top:0">取引先名</label>
        <input type="text" id="cf-label" value="${c.label}" placeholder="例：得意先 ABC">
        <label>製品</label>
        <select id="cf-prod">${prodOpts}</select>
        <label>カラー</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px" id="color-btns">${colorBtns}</div>
        <div id="cf-preview" style="margin-top:10px;padding:6px 12px;border-radius:6px;display:inline-block;font-size:13px;font-weight:700;background:${c.bg};color:${c.tc}">${c.label||'プレビュー'}</div>
        <div style="display:flex;gap:8px;margin-top:18px">
          <button class="btn btn-cancel" onclick="openCatManager()">戻る</button>
          <button class="btn btn-primary" onclick="saveCat()">保存</button>
        </div>
      </div>
    </div>`;
  document.getElementById('cf-label').addEventListener('input',updateCatPreview);
}

function selectColor(ci){
  const cp=COLOR_PRESETS[ci];
  document.getElementById('cf-bg').value=cp.bg;
  document.getElementById('cf-tc').value=cp.tc;
  document.querySelectorAll('[id^="cpbtn-"]').forEach((b,i)=>{
    b.style.border=`2px solid ${i===ci?cp.tc:'transparent'}`;
  });
  updateCatPreview();
}

function updateCatPreview(){
  const label=document.getElementById('cf-label').value||'プレビュー';
  const bg=document.getElementById('cf-bg').value;
  const tc=document.getElementById('cf-tc').value;
  const el=document.getElementById('cf-preview');
  if(el){el.textContent=label;el.style.background=bg;el.style.color=tc;}
}

function saveCat(){
  const label=document.getElementById('cf-label').value.trim();
  if(!label){alert('取引先名を入力してください');return;}
  const idx=+document.getElementById('cf-idx').value;
  const bg=document.getElementById('cf-bg').value;
  const tc=document.getElementById('cf-tc').value;
  const prodId=document.getElementById('cf-prod').value;
  if(idx<0){
    const newId='CAT'+Date.now();
    CATS.push({id:newId,label,bg,tc,prodId});
  } else {
    CATS[idx]={...CATS[idx],label,bg,tc,prodId};
  }
  rebuildCatMap();rebuildCatSelect();render();openCatManager();
}

function deleteCat(idx){
  const c=CATS[idx];
  const inUse=SHIPS.some(s=>s.cat===c.id);
  if(inUse&&!confirm(`「${c.label}」は出荷予定で使用されています。\n削除すると関連する出荷データも影響を受けます。\n本当に削除しますか？`))return;
  if(!inUse&&!confirm(`「${c.label}」を削除しますか？`))return;
  CATS.splice(idx,1);
  rebuildCatMap();rebuildCatSelect();render();openCatManager();
}

/* ========== SEARCH ========== */
let searchQuery='';
const DOWS=['日','月','火','水','木','金','土'];
function onSearch(val){
  searchQuery=val.trim();
  document.getElementById('search-clear').style.display=searchQuery?'':'none';
  if(searchQuery){
    document.getElementById('cal-area').style.display='none';
    renderSearchResults();
  } else {
    document.getElementById('cal-area').style.display='';
    document.getElementById('search-results').style.display='none';
  }
}
function clearSearch(){
  document.getElementById('search-input').value='';
  onSearch('');
}
function renderSearchResults(){
  const q=searchQuery.toLowerCase();
  const matched=SHIPS.map((s,i)=>({s,i})).filter(({s})=>{
    const c=catMap[s.cat],p=c?prodMap[c.prodId]:null;
    return (p&&p.name.toLowerCase().includes(q))||s.item.toLowerCase().includes(q);
  });
  const el=document.getElementById('search-results');
  el.style.display='';
  if(!matched.length){
    el.innerHTML=`<div class="sresult-list"><div class="sresult-empty">「${searchQuery}」に一致するデータなし</div></div>`;
    return;
  }
  const rows=matched.map(({s,i})=>{
    const c=catMap[s.cat],p=c?prodMap[c.prodId]:null;
    const st=s.shipped?'ok':getShipStatus(s);
    const stColor={ok:'#16a34a',cond:'#ca8a04',ng:'#dc2626'}[st];
    const d=new Date(s.d[0],s.d[1]-1,s.d[2]);
    const dateStr=`${s.d[0]}/${String(s.d[1]).padStart(2,'0')}/${String(s.d[2]).padStart(2,'0')}（${DOWS[d.getDay()]}）`;
    return`<div class="sresult-item" onclick="showDetail(${i})">
      <div class="sresult-st" style="background:${stColor}"></div>
      <div class="sresult-date">${dateStr}</div>
      <div class="sresult-name">${p?p.name+' ':''}<span style="font-weight:400;color:#555">${s.item}</span></div>
      <div class="sresult-qty">${s.qty.toLocaleString()}個</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="sresult-list">
    <div class="sresult-hdr">「${searchQuery}」の検索結果　${matched.length}件</div>
    ${rows}
  </div>`;
}


function openPanel(){document.getElementById('edit-panel').classList.add('open');document.getElementById('panel-bg').style.display='block'}
function closePanel(){document.getElementById('edit-panel').classList.remove('open');document.getElementById('panel-bg').style.display='none'}
function closeModal(){document.getElementById('modal-wrap').innerHTML=''}
function toDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function prevMonth(){cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);renderCal()}
function nextMonth(){cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);renderCal()}
function goToday(){cur=new Date(today.getFullYear(),today.getMonth(),1);renderCal()}
document.addEventListener('change',e=>{if(['ep-cat','ep-qty'].includes(e.target.id))updateStockInfo()});
document.addEventListener('input',e=>{if(e.target.id==='ep-qty')updateStockInfo()});
render();
</script>
