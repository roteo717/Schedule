<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>月間出荷予定表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ok:        #15803d;
  --ok-light:  #dcfce7;
  --ok-mid:    #86efac;
  --warn:      #b45309;
  --warn-light:#fef9c3;
  --warn-mid:  #fde047;
  --ng:        #b91c1c;
  --ng-light:  #fee2e2;
  --ng-mid:    #fca5a5;
  --ink:       #0f172a;
  --ink2:      #334155;
  --ink3:      #64748b;
  --ink4:      #94a3b8;
  --border:    #e2e8f0;
  --surface:   #f8fafc;
  --white:     #ffffff;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.06);
  --shadow-modal: 0 8px 40px rgba(0,0,0,.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.app-header {
  background: var(--white);
  border-bottom: 2px solid var(--ink);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-brand h1 {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: .04em;
}
.btn-add {
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 7px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s, transform .1s;
}
.btn-add:hover { background: #1e293b; }
.btn-add:active { transform: scale(.97); }

/* ── LEGEND ── */
.legend-strip {
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  gap: 14px;
  align-items: center;
  background: var(--surface);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-dot.ok   { background: var(--ok); }
.legend-dot.warn { background: var(--warn); }
.legend-dot.ng   { background: var(--ng); }

/* ── 直近の不足リスト ── */
.ng-panel {
  margin: 12px 12px 0;
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1.5px solid #fca5a5;
}
.ng-panel-header {
  background: var(--ng);
  color: var(--white);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .07em;
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ng-panel-empty {
  background: var(--surface);
  padding: 12px 14px;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink3);
}
.ng-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--ng-light);
  border-top: 1px solid #fca5a5;
  cursor: pointer;
  transition: background .12s;
}
.ng-row:hover  { background: #ffd7d7; }
.ng-row:active { background: var(--ng-mid); }
.ng-row-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.ng-row-name {
  font-size: 11px;
  color: var(--ink3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ng-row-date {
  font-size: 11px;
  font-weight: 700;
  color: var(--ng);
  white-space: nowrap;
}
.ng-row-stock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 900;
  color: var(--ng);
  white-space: nowrap;
}
.ng-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 12px 0;
}

/* ── CALENDAR ── */
.cal-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 0 60px;
}
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
}
.month-label {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: .03em;
}
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--ink2);
  transition: border-color .15s, background .15s;
}
.nav-btn:hover  { border-color: var(--ink); background: var(--surface); }
.nav-btn:active { background: var(--border); }

.dow-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
  margin-bottom: 4px;
}
.dow-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--ink4);
  padding: 4px 0;
}
.dow-cell:first-child { color: #ef4444; }
.dow-cell:last-child  { color: #3b82f6; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  padding: 0 12px;
}
.cal-day {
  aspect-ratio: 1 / 1.15;
  border-radius: var(--r-sm);
  border: 1.5px solid transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 5px 2px 3px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
  position: relative;
  min-width: 0;
  background: var(--white);
  user-select: none;
}
.cal-day:not(.empty):hover  { border-color: var(--ink); background: var(--surface); }
.cal-day:not(.empty):active { transform: scale(.95); }
.cal-day.empty { cursor: default; opacity: 0; pointer-events: none; }
.cal-day.today .day-num {
  background: var(--ink); color: var(--white);
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.sunday  .day-num { color: #ef4444; }
.cal-day.saturday .day-num { color: #3b82f6; }
.cal-day.today .day-num { color: var(--white) !important; }
.day-num {
  font-size: 12px; font-weight: 700; line-height: 1; margin-bottom: 3px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.has-ng   { background: #ffe4e6; border: 2px solid #b91c1c !important; }
.cal-day.has-warn { background: #fffdf0; }
.cal-day.has-ok   { background: #f0faf4; }
.day-count {
  font-size: 11px; font-weight: 900; line-height: 1;
  padding: 2px 5px; border-radius: 4px; margin-top: 1px;
}
.day-count.ng   { background: #b91c1c; color: #fff; }
.day-count.warn { background: var(--warn); color: #fff; }
.day-count.ok   { background: var(--ok); color: #fff; }
.cal-day.ng-filter-dim { opacity: .3; }
.cal-day.first-negative { outline: 2px dashed var(--ng); outline-offset: -2px; }
.cal-day.first-negative::after {
  content: '▼'; position: absolute; bottom: 2px; right: 3px;
  font-size: 7px; color: var(--ng);
}

/* ── DETAIL SHEET ── */
.detail-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; justify-content: flex-end;
  pointer-events: none; opacity: 0; transition: opacity .2s;
}
.detail-overlay.open { opacity: 1; pointer-events: all; }
.detail-backdrop {
  position: absolute; inset: 0;
  background: rgba(15,23,42,.45); backdrop-filter: blur(2px);
}
.detail-sheet {
  position: relative; background: var(--white);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  max-height: 80vh; overflow-y: auto;
  transform: translateY(40px);
  transition: transform .25s cubic-bezier(.32,1.2,.6,1);
  box-shadow: var(--shadow-modal);
}
.detail-overlay.open .detail-sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 10px auto 0;
}
.sheet-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sheet-date {
  font-size: 17px; font-weight: 900;
  display: flex; align-items: center; gap: 8px;
}
.sheet-close {
  width: 30px; height: 30px; border: 1.5px solid var(--border);
  border-radius: 50%; background: var(--white); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--ink3); transition: border-color .15s;
}
.sheet-close:hover { border-color: var(--ink); color: var(--ink); }
.sheet-filter {
  padding: 8px 16px; display: flex; gap: 6px;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.chip-filter {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--white); cursor: pointer; transition: all .15s;
}
.chip-filter.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.chip-filter:not(.active):hover { border-color: var(--ink3); }
.sheet-cards { padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 10px; }

/* ── ITEM CARD ── */
.item-card {
  border-radius: var(--r-md); border: 1.5px solid var(--border);
  overflow: hidden; box-shadow: var(--shadow-card);
  animation: slideIn .2s ease both;
}
.item-card.ng { border: 2px solid #b91c1c; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; padding: 10px 14px 8px; gap: 8px;
}
.card-id-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.card-part {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 700; letter-spacing: .04em; color: var(--ink);
}
.card-part-name {
  font-size: 11px; color: var(--ink3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
}
.card-actions-row { display: flex; gap: 5px; flex-shrink: 0; }
.btn-card-edit, .btn-card-del {
  border: none; border-radius: 5px; font-family: inherit;
  font-size: 12px; font-weight: 700; padding: 8px 12px;
  cursor: pointer; transition: all .12s; min-height: 36px;
}
.btn-card-edit { background: var(--surface); color: var(--ink3); border: 1px solid var(--border); }
.btn-card-edit:hover { background: var(--border); color: var(--ink); }
.btn-card-del  { background: var(--ng-light); color: var(--ng); }
.btn-card-del:hover { background: var(--ng-mid); }
.card-nums {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.num-box { padding: 8px 10px; text-align: center; border-right: 1px solid var(--border); }
.num-box:last-child { border-right: none; }
.num-box-label {
  font-size: 9px; font-weight: 700; letter-spacing: .08em;
  color: var(--ink4); text-transform: uppercase; margin-bottom: 3px;
}
.num-box-val { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; color: var(--ink); }
.num-box.ship .num-box-label { color: #6366f1; }
.num-box.ship .num-box-val   { color: #4338ca; }
.num-box.done .num-box-label { color: #15803d; }
.num-box.done .num-box-val   { color: #15803d; }
.num-box.wip  .num-box-label { color: #b45309; }
.num-box.wip  .num-box-val   { color: #b45309; }
.card-result {
  display: flex; align-items: center; justify-content: space-between; padding: 9px 14px;
}
.card.ok   .card-result { background: var(--ok-light); }
.card.warn .card-result { background: var(--warn-light); }
.card.ng   .card-result { background: var(--ng-light); }
.result-status { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
.card.ok   .result-status { color: var(--ok); }
.card.warn .result-status { color: var(--warn); }
.card.ng   .result-status { color: var(--ng); }
.result-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
.card.ok   .result-num { color: var(--ok); }
.card.warn .result-num { color: var(--warn); }
.card.ng   .result-num { color: var(--ng); font-size: 19px; }

/* ── FORM MODAL ── */
.form-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity .2s;
}
.form-overlay.open { opacity: 1; pointer-events: all; }
.form-backdrop { position: absolute; inset: 0; background: rgba(15,23,42,.5); }
.form-sheet {
  position: relative; background: var(--white);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  width: 100%; max-width: 480px; padding: 20px 20px 40px;
  transform: translateY(50px);
  transition: transform .25s cubic-bezier(.32,1.2,.6,1);
  box-shadow: var(--shadow-modal); max-height: 90vh; overflow-y: auto;
}
.form-overlay.open .form-sheet { transform: translateY(0); }
.form-title {
  font-size: 16px; font-weight: 900; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.form-close {
  width: 28px; height: 28px; border: 1.5px solid var(--border);
  border-radius: 50%; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink3);
}
.form-close:hover { border-color: var(--ink); color: var(--ink); }
.form-field { margin-bottom: 12px; }
.form-field label {
  display: block; font-size: 11px; font-weight: 700; color: var(--ink3);
  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px;
}
.form-field input {
  width: 100%; padding: 11px 12px; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); font-size: 16px; font-family: inherit;
  color: var(--ink); background: var(--white); outline: none;
  transition: border-color .15s; -webkit-appearance: none;
}
.form-field input:focus { border-color: var(--ink); }
.num-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.form-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-cancel-form, .btn-save-form {
  flex: 1; padding: 13px; border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; transition: all .15s;
}
.btn-cancel-form { background: var(--surface); color: var(--ink3); border: 1.5px solid var(--border); }
.btn-cancel-form:hover { background: var(--border); color: var(--ink); }
.btn-save-form { background: var(--ink); color: var(--white); }
.btn-save-form:hover  { background: #1e293b; }
.btn-save-form:active { transform: scale(.98); }

/* ── EMPTY STATE ── */
.empty-sheet { padding: 40px 16px; text-align: center; color: var(--ink4); }
.empty-sheet svg { margin-bottom: 10px; }
.empty-sheet p { font-size: 13px; }
.empty-add-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
  background: var(--ink); color: var(--white); border: none;
  border-radius: var(--r-sm); font-family: inherit; font-size: 13px;
  font-weight: 700; padding: 10px 18px; cursor: pointer; transition: background .15s;
}
.empty-add-btn:hover { background: #1e293b; }

@media(min-width:560px) {
  .form-overlay { align-items: center; }
  .form-sheet { border-radius: var(--r-lg); transform: scale(.95); max-height: 80vh; }
  .form-overlay.open .form-sheet { transform: scale(1); }
  .detail-sheet { border-radius: var(--r-lg); max-width: 540px; margin: auto; }
  .detail-overlay { align-items: center; }
}
@media(max-width:360px) {
  .day-num { font-size: 11px; width: 20px; height: 20px; }
  .day-count { font-size: 10px; padding: 1px 4px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-brand"><h1>月間出荷予定表</h1></div>
  <button class="btn-add" onclick="openForm()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    追加
  </button>
</header>

<!-- LEGEND -->
<div class="legend-strip">
  <div class="legend-item"><span class="legend-dot ok"></span>OK</div>
  <div class="legend-item"><span class="legend-dot warn"></span>要注意</div>
  <div class="legend-item"><span class="legend-dot ng"></span>不足</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer">
      <input type="checkbox" id="calNgFilter" onchange="renderCalendar()" style="accent-color:#b91c1c;width:14px;height:14px">
      不足のみ
    </label>
  </div>
</div>

<!-- 直近の不足リスト -->
<div id="ngPanel" class="ng-panel" style="display:none">
  <div class="ng-panel-header">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    直近の不足（3日以内）
  </div>
  <div id="ngRows"></div>
</div>
<div class="ng-divider" id="ngDivider" style="display:none"></div>

<!-- CALENDAR -->
<div class="cal-wrap">
  <div class="month-nav">
    <div class="month-label" id="monthLabel"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
      <button class="nav-btn" onclick="goToday()">今</button>
      <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
    </div>
  </div>
  <div class="dow-header">
    <div class="dow-cell">日</div><div class="dow-cell">月</div>
    <div class="dow-cell">火</div><div class="dow-cell">水</div>
    <div class="dow-cell">木</div><div class="dow-cell">金</div>
    <div class="dow-cell">土</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-backdrop" onclick="closeDetail()"></div>
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-date" id="sheetDate"></div>
      <button class="sheet-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="sheet-filter">
      <button class="chip-filter active" data-f="all" onclick="setSheetFilter('all',this)">すべて</button>
      <button class="chip-filter" data-f="ng"  onclick="setSheetFilter('ng',this)">&#x1F534;不足のみ</button>
    </div>
    <div class="sheet-cards" id="sheetCards"></div>
  </div>
</div>

<!-- FORM SHEET -->
<div class="form-overlay" id="formOverlay">
  <div class="form-backdrop" onclick="closeForm()"></div>
  <div class="form-sheet">
    <div class="form-title">
      <span id="formTitle">案件を追加</span>
      <button class="form-close" onclick="closeForm()">&#x2715;</button>
    </div>
    <div class="form-field">
      <label>品番</label>
      <input type="text" id="fPartId" placeholder="例：A-1234" autocomplete="off" autocapitalize="characters"
        oninput="onPartIdInput(this.value)">
    </div>
    <div class="form-field">
      <label>品名</label>
      <input type="text" id="fPartName" placeholder="例：六角ボルトM6" autocomplete="off">
    </div>
    <div class="form-field">
      <label>出荷日</label>
      <input type="date" id="fDate">
    </div>
    <div class="num-fields">
      <div class="form-field">
        <label>出荷数</label>
        <input type="number" id="fShip" placeholder="0" min="0" inputmode="numeric">
      </div>
      <div class="form-field">
        <label>完成品</label>
        <input type="number" id="fDone" placeholder="0" min="0" inputmode="numeric">
      </div>
      <div class="form-field">
        <label>仕掛品</label>
        <input type="number" id="fWip"  placeholder="0" min="0" inputmode="numeric">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel-form" onclick="closeForm()">キャンセル</button>
      <button class="btn-save-form"   onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const KEY = 'sc_items_v1';
let items      = [];
let editId     = null;
let viewYear, viewMonth;
let selectedDate = null;
let sheetFilter  = 'all';
const safetyStock = 20;
let stockTimeline = {};

const todayStr = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function load() {
  try { items = JSON.parse(localStorage.getItem(KEY)) || seed(); }
  catch { items = seed(); }
}
function persist() { localStorage.setItem(KEY, JSON.stringify(items)); }

function seed() {
  const [y,m,d] = todayStr.split('-').map(Number);
  const fmt = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const today = fmt(y,m,d);
  const plus = n => { const t=new Date(y,m-1,d+n); return fmt(t.getFullYear(),t.getMonth()+1,t.getDate()); };
  return [
    {id:uid(), partId:'A-1001', partName:'六角ボルトM6',   date:today,   ship:100, done:80,  wip:30},
    {id:uid(), partId:'B-2045', partName:'スラスト軸受',   date:today,   ship:200, done:200, wip:0 },
    {id:uid(), partId:'C-3320', partName:'プレスブラケット',date:plus(2), ship:150, done:60,  wip:50},
    {id:uid(), partId:'D-4788', partName:'シールリング',   date:plus(2), ship:80,  done:80,  wip:10},
    {id:uid(), partId:'E-5512', partName:'アングルブラケット',date:plus(3), ship:120, done:40, wip:20},
    {id:uid(), partId:'F-6001', partName:'止めリング',     date:plus(7), ship:50,  done:50,  wip:5 },
  ];
}

/* ═══════════════════════════════════════
   在庫タイムライン計算（品番ごと）
   当日在庫 = 前日在庫 + 当日完成 - 当日出荷
   ※ wip は在庫計算に含めない（表示用のみ）
   ※ 初期在庫は 0 固定
═══════════════════════════════════════ */
function calculateStockTimeline(items) {
  const byPart = {};
  for (const it of items) {
    if (!byPart[it.partId]) byPart[it.partId] = [];
    byPart[it.partId].push(it);
  }
  const timelines = {};
  for (const [partId, partItems] of Object.entries(byPart)) {
    const dayMap = {};
    for (const it of partItems) {
      if (!dayMap[it.date]) dayMap[it.date] = { ship:0, done:0 };
      dayMap[it.date].ship += it.ship || 0;
      dayMap[it.date].done += it.done || 0;
    }
    const sortedDates = Object.keys(dayMap).sort();
    const timeline = {};
    let stock = 0; // 初期在庫 0 固定
    for (const date of sortedDates) {
      stock = stock + dayMap[date].done - dayMap[date].ship;
      timeline[date] = stock;
    }
    timelines[partId] = timeline;
  }
  // デバッグ出力
  console.log('📦 在庫タイムライン（品番別）');
  for (const [partId, tl] of Object.entries(timelines)) {
    const lines = Object.entries(tl)
      .map(([date, s]) => `  ${date}  在庫:${String(s).padStart(6)}  ${judgeStock(s)==='ng'?'🔴':judgeStock(s)==='warn'?'🟡':'🟢'}`)
      .join('\n');
    console.log(`  [${partId}]\n${lines}`);
  }
  return timelines;
}

function refreshTimeline() { stockTimeline = calculateStockTimeline(items); }

function getStockForPartOnDate(partId, dateStr) {
  const tl = stockTimeline[partId];
  if (!tl) return 0;
  if (tl[dateStr] !== undefined) return tl[dateStr];
  const sortedDates = Object.keys(tl).sort();
  let last = 0;
  for (const d of sortedDates) {
    if (d > dateStr) break;
    last = tl[d];
  }
  return last;
}

function judgeStock(stock) {
  if (stock < 0)            return 'ng';
  if (stock <= safetyStock) return 'warn';
  return 'ok';
}

function getDayWorstStatus(dateStr) {
  const dayItems = items.filter(i => i.date === dateStr);
  if (dayItems.length === 0) return null;
  const partIds = [...new Set(dayItems.map(i => i.partId))];
  let worst = 'ok';
  for (const partId of partIds) {
    const s = judgeStock(getStockForPartOnDate(partId, dateStr));
    if (s === 'ng')   return 'ng';
    if (s === 'warn') worst = 'warn';
  }
  return worst;
}

function firstNegativeDate() {
  let first = null;
  for (const [, tl] of Object.entries(stockTimeline)) {
    for (const [date, stock] of Object.entries(tl)) {
      if (stock < 0) {
        if (!first || date < first) first = date;
        break;
      }
    }
  }
  return first;
}

// 品番に紐づく品名を返す（最新案件から取得）
function getPartName(partId) {
  const its = items.filter(i => i.partId === partId && i.partName).sort((a,b) => b.date.localeCompare(a.date));
  return its.length > 0 ? its[0].partName : '';
}

/* ═══════════════════════════════════════
   直近の不足リスト（今日〜3日以内・最大3件）
═══════════════════════════════════════ */
function renderNgPanel() {
  // 3日後の日付を計算
  const [y,m,d] = todayStr.split('-').map(Number);
  const limit = new Date(y,m-1,d+3);
  const limitStr = `${limit.getFullYear()}-${String(limit.getMonth()+1).padStart(2,'0')}-${String(limit.getDate()).padStart(2,'0')}`;

  // 今日〜3日以内のNG（partId・date単位）を収集
  const ngEvents = [];
  for (const [partId, tl] of Object.entries(stockTimeline)) {
    for (const [date, stock] of Object.entries(tl)) {
      if (date >= todayStr && date <= limitStr && stock < 0) {
        ngEvents.push({ partId, date, stock });
      }
    }
  }

  // 並び順：日付昇順 → 不足数降順（絶対値大 = 深刻）
  ngEvents.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.stock - b.stock; // 負の値が小さい（より深刻）ほど先
  });

  const top = ngEvents.slice(0, 3);
  const panel   = document.getElementById('ngPanel');
  const rowsEl  = document.getElementById('ngRows');
  const divider = document.getElementById('ngDivider');

  if (top.length === 0) {
    panel.style.display = 'block';
    rowsEl.innerHTML = '<div class="ng-panel-empty">&#x2705; 不足はありません</div>';
    divider.style.display = 'block';
    return;
  }

  panel.style.display = 'block';
  divider.style.display = 'block';

  rowsEl.innerHTML = top.map(ev => {
    const [ey,em,eday] = ev.date.split('-').map(Number);
    const isToday  = ev.date === todayStr;
    const dateLabel = isToday ? '今日' : `${em}/${eday}`;
    const name = getPartName(ev.partId);
    const nameHtml = name ? `<div class="ng-row-name">${escHtml(name)}</div>` : '';
    return `<div class="ng-row" onclick="openDetail('${ev.date}')">
      <div style="min-width:0">
        <div class="ng-row-id">${escHtml(ev.partId)}</div>
        ${nameHtml}
      </div>
      <span class="ng-row-date">${dateLabel}</span>
      <span class="ng-row-stock">${ev.stock.toLocaleString()}</span>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   CALENDAR RENDER
═══════════════════════════════════════ */
function renderCalendar() {
  refreshTimeline();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${viewYear}年 ${monthNames[viewMonth]}`;

  const firstNeg  = firstNegativeDate();
  const ngFilterOn = document.getElementById('calNgFilter').checked;
  const lastDay   = new Date(viewYear, viewMonth+1, 0);
  const dow0      = new Date(viewYear, viewMonth, 1).getDay();
  const grid      = document.getElementById('calGrid');
  grid.innerHTML  = '';

  for (let i=0; i<dow0; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=lastDay.getDate(); d++) {
    const dateStr  = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = items.filter(i => i.date === dateStr);
    const dow      = new Date(viewYear, viewMonth, d).getDay();
    const dayStatus = getDayWorstStatus(dateStr);

    const el  = document.createElement('div');
    let   cls = 'cal-day';
    if (dateStr === todayStr) cls += ' today';
    if (dow===0) cls += ' sunday';
    if (dow===6) cls += ' saturday';
    if (dayItems.length > 0 && dayStatus) {
      cls += ` has-${dayStatus}`;
      if (ngFilterOn && dayStatus !== 'ng') cls += ' ng-filter-dim';
    }
    if (dateStr === firstNeg) cls += ' first-negative';
    el.className = cls;
    el.setAttribute('data-date', dateStr);

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    if (dayItems.length > 0 && dayStatus) {
      const badge = document.createElement('div');
      badge.className = `day-count ${dayStatus}`;
      badge.textContent = dayItems.length;
      el.appendChild(badge);
    }
    el.onclick = () => openDetail(dateStr);
    grid.appendChild(el);
  }

  renderNgPanel();
}

/* ═══════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════ */
function openDetail(dateStr) {
  selectedDate = dateStr;
  sheetFilter  = 'all';
  document.querySelectorAll('.chip-filter').forEach(b => b.classList.toggle('active', b.dataset.f==='all'));
  const [y,m,d] = dateStr.split('-').map(Number);
  const dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  const isToday = dateStr === todayStr;
  document.getElementById('sheetDate').innerHTML =
    `${m}月${d}日（${dow}）${isToday ? '<span style="font-size:11px;background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:6px">TODAY</span>' : ''}`;
  renderSheetCards();
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function setSheetFilter(f) {
  sheetFilter = f;
  document.querySelectorAll('.chip-filter').forEach(b => b.classList.toggle('active', b.dataset.f===f));
  renderSheetCards();
}

function renderSheetCards() {
  const allDayItems = items.filter(i => i.date === selectedDate);
  const dayItems = allDayItems.filter(it => {
    if (sheetFilter === 'all') return true;
    return judgeStock(getStockForPartOnDate(it.partId, selectedDate)) === sheetFilter;
  }).sort((a,b) => {
    const rank = {ng:0, warn:1, ok:2};
    return rank[judgeStock(getStockForPartOnDate(a.partId,selectedDate))]
         - rank[judgeStock(getStockForPartOnDate(b.partId,selectedDate))];
  });

  const cont = document.getElementById('sheetCards');

  if (allDayItems.length === 0) {
    cont.innerHTML = `<div class="empty-sheet">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>この日の出荷予定はありません</p>
      <button class="empty-add-btn" onclick="openForm('${selectedDate}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        この日に追加する
      </button>
    </div>`;
    return;
  }
  if (dayItems.length === 0) {
    cont.innerHTML = `<div class="empty-sheet">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>不足案件はありません</p></div>`;
    return;
  }

  const statusMap = { ok:['出荷OK','🟢'], warn:['要注意','🟡'], ng:['在庫不足','🔴'] };
  cont.innerHTML = dayItems.map((it, idx) => {
    const partStock  = getStockForPartOnDate(it.partId, selectedDate);
    const partStatus = judgeStock(partStock);
    const [label, icon] = statusMap[partStatus];
    const nameHtml = it.partName
      ? `<div class="card-part-name" title="${escHtml(it.partName)}">${escHtml(it.partName)}</div>` : '';
    return `<div class="item-card card ${partStatus}" style="animation-delay:${idx*50}ms">
      <div class="card-top">
        <div class="card-id-block">
          <span class="card-part">${escHtml(it.partId)}</span>
          ${nameHtml}
        </div>
        <div class="card-actions-row">
          <button class="btn-card-edit" onclick="openEdit('${it.id}')">&#x270F; 編集</button>
          <button class="btn-card-del"  onclick="deleteItem('${it.id}')">削除</button>
        </div>
      </div>
      <div class="card-nums">
        <div class="num-box ship">
          <div class="num-box-label">出荷数</div>
          <div class="num-box-val">${(it.ship||0).toLocaleString()}</div>
        </div>
        <div class="num-box done">
          <div class="num-box-label">完成品</div>
          <div class="num-box-val">${(it.done||0).toLocaleString()}</div>
        </div>
        <div class="num-box wip">
          <div class="num-box-label">仕掛品</div>
          <div class="num-box-val">${(it.wip||0).toLocaleString()}</div>
        </div>
      </div>
      <div class="card-result">
        <span class="result-status">${icon} ${label}</span>
        <span class="result-num">残 ${partStock.toLocaleString()}</span>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   FORM
═══════════════════════════════════════ */
// 品番入力時：品名・完成品・仕掛品を同じ品番の最新案件から自動反映
function onPartIdInput(partId) {
  const trimmed = partId.trim();
  if (!trimmed) return;
  const same = items.filter(i => i.partId === trimmed).sort((a,b) => b.date.localeCompare(a.date));
  if (same.length === 0) return;
  const latest = same[0];
  const nameEl = document.getElementById('fPartName');
  const doneEl = document.getElementById('fDone');
  const wipEl  = document.getElementById('fWip');
  if (nameEl !== document.activeElement && latest.partName) nameEl.value = latest.partName;
  if (doneEl !== document.activeElement) doneEl.value = latest.done ?? 0;
  if (wipEl  !== document.activeElement) wipEl.value  = latest.wip  ?? 0;
}

function openForm(prefillDate) {
  editId = null;
  document.getElementById('formTitle').textContent = '案件を追加';
  document.getElementById('fPartId').value   = '';
  document.getElementById('fPartName').value = '';
  document.getElementById('fDate').value     = prefillDate || todayStr;
  document.getElementById('fShip').value     = '';
  document.getElementById('fDone').value     = '0';
  document.getElementById('fWip').value      = '0';
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('fPartId').focus(), 300);
}
function openEdit(id) {
  const it = items.find(i => i.id===id);
  if (!it) return;
  editId = id;
  document.getElementById('formTitle').textContent = '案件を編集';
  document.getElementById('fPartId').value   = it.partId;
  document.getElementById('fPartName').value = it.partName || '';
  document.getElementById('fDate').value     = it.date;
  document.getElementById('fShip').value     = it.ship;
  document.getElementById('fDone').value     = it.done;
  document.getElementById('fWip').value      = it.wip;
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function saveItem() {
  const partId   = document.getElementById('fPartId').value.trim();
  const partName = document.getElementById('fPartName').value.trim();
  const date     = document.getElementById('fDate').value;
  const ship     = parseInt(document.getElementById('fShip').value) || 0;
  const done     = parseInt(document.getElementById('fDone').value) || 0;
  const wip      = parseInt(document.getElementById('fWip').value)  || 0;
  if (!partId || !date) { alert('品番と出荷日は必須です'); return; }
  if (editId) {
    const idx = items.findIndex(i => i.id===editId);
    if (idx>=0) items[idx] = { id:editId, partId, partName, date, ship, done, wip };
  } else {
    items.push({ id:uid(), partId, partName, date, ship, done, wip });
  }
  persist();
  closeForm();
  const [y,m] = date.split('-').map(Number);
  viewYear = y; viewMonth = m-1;
  renderCalendar();
  openDetail(date);
}
function deleteItem(id) {
  if (!confirm('この案件を削除しますか？')) return;
  items = items.filter(i => i.id!==id);
  persist();
  renderCalendar();
  if (selectedDate) renderSheetCards();
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
function prevMonth() {
  if (viewMonth===0) { viewYear--; viewMonth=11; } else viewMonth--;
  renderCalendar();
}
function nextMonth() {
  if (viewMonth===11) { viewYear++; viewMonth=0; } else viewMonth++;
  renderCalendar();
}
function goToday() {
  const t = new Date(); viewYear = t.getFullYear(); viewMonth = t.getMonth();
  renderCalendar();
}

/* ═══════════════════════════════════════
   UTIL
═══════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
load();
const now = new Date();
viewYear  = now.getFullYear();
viewMonth = now.getMonth();
renderCalendar();
</script>
</body>
</html>
